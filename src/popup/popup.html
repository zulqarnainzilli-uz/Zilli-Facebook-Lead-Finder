<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zilli - Lead Finder</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="zilli-container">
        <!-- Header -->
        <div class="zilli-header">
            <div class="header-content">
                <h1>🔍 Zilli Lead Finder</h1>
                <p>Facebook سے Leads تلاش کریں</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="zilli-tabs">
            <button class="tab-btn active" data-tab="search">تلاش & Scrape</button>
            <button class="tab-btn" data-tab="results">نتائج</button>
            <button class="tab-btn" data-tab="sessions">Sessions</button>
            <button class="tab-btn" data-tab="settings">ترتیبات</button>
        </div>

        <!-- Tab Content -->
        <div class="zilli-content">
            <!-- Tab 1: Search & Scrape -->
            <div id="search-tab" class="tab-panel active">
                <div class="section">
                    <label class="label">Keyword یا Topic:</label>
                    <input type="text" id="search-input" placeholder="مثلاً: CBD Shop, Digital Marketing..." class="input">
                </div>

                <div class="section">
                    <label class="label">کتنے Profiles نکالنے ہیں؟</label>
                    <div class="quick-buttons">
                        <button class="quick-btn" data-limit="100">100</button>
                        <button class="quick-btn" data-limit="500">500</button>
                        <button class="quick-btn" data-limit="1000">1000</button>
                        <button class="quick-btn" data-limit="5000">5000</button>
                    </div>
                    <input type="number" id="custom-limit" placeholder="خود بتائیں" min="10" max="50000" class="input">
                </div>

                <div class="section">
                    <label class="label">Progress:</label>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div id="progress-fill"></div>
                        </div>
                        <div class="progress-text">
                            <span id="progress-current">0</span> / <span id="progress-total">100</span>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <label class="label">Statistics:</label>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-label">Profiles Found</span>
                            <span class="stat-value" id="stat-found">0</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Data Extracted</span>
                            <span class="stat-value" id="stat-extracted">0</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Failed</span>
                            <span class="stat-value" id="stat-failed">0</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Time Elapsed</span>
                            <span class="stat-value" id="stat-time">00:00</span>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button id="start-btn" class="btn btn-primary">▶ شروع کریں</button>
                    <button id="pause-btn" class="btn btn-warning" disabled>⏸ Pause</button>
                    <button id="stop-btn" class="btn btn-danger" disabled>⏹ رکیں</button>
                </div>
            </div>

            <!-- Tab 2: Results -->
            <div id="results-tab" class="tab-panel">
                <div class="section">
                    <label class="label">نتائج کو Filter کریں:</label>
                    <input type="text" id="filter-input" placeholder="نام یا ای میل سے تلاش کریں..." class="input">
                </div>

                <div class="section">
                    <div class="results-controls">
                        <select id="export-format" class="input" style="flex: 1;">
                            <option value="csv">CSV میں ڈاؤن لوڈ کریں</option>
                            <option value="json">JSON میں ڈاؤن لوڈ کریں</option>
                            <option value="excel">Excel میں ڈاؤن لوڈ کریں</option>
                        </select>
                        <button id="export-btn" class="btn btn-primary">📥 ڈاؤن لوڈ</button>
                    </div>
                </div>

                <div class="section" style="flex: 1; overflow-y: auto;">
                    <div id="results-list" style="height: 100%; overflow-y: auto;"></div>
                </div>
            </div>

            <!-- Tab 3: Sessions -->
            <div id="sessions-tab" class="tab-panel">
                <div class="section">
                    <label class="label">آپ کے Sessions:</label>
                    <div id="sessions-list"></div>
                </div>

                <div class="section">
                    <button id="clear-sessions-btn" class="btn btn-danger" style="width: 100%;">تمام Sessions حذف کریں</button>
                </div>
            </div>

            <!-- Tab 4: Settings -->
            <div id="settings-tab" class="tab-panel">
                <div class="section">
                    <h3>General Settings</h3>
                    <div class="setting-item">
                        <label class="checkbox-label">
                            <input type="checkbox" id="auto-save" checked>
                            Auto-save data
                        </label>
                    </div>
                    <div class="setting-item">
                        <label class="checkbox-label">
                            <input type="checkbox" id="notifications" checked>
                            Desktop notifications
                        </label>
                    </div>
                </div>

                <div class="section">
                    <h3>Scraping Settings</h3>
                    <div class="setting-item">
                        <label class="label">Scroll Delay (ms):</label>
                        <input type="number" id="scroll-delay" value="1000" class="input" min="500" max="5000">
                    </div>
                    <div class="setting-item">
                        <label class="label">Request Timeout (sec):</label>
                        <input type="number" id="request-timeout" value="30" class="input" min="10" max="120">
                    </div>
                </div>

                <div class="section">
                    <h3>About</h3>
                    <div class="about-info">
                        <p><strong>Version:</strong> 1.0.0</p>
                        <p><strong>Made by:</strong> Zilli Team 💙</p>
                        <p><strong>Last Updated:</strong> May 2026</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
